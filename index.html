<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>MOURA BJJ SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0d; color: #fafafa; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(18, 18, 21, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-pro { background: #1a1a1e; border: 1px solid #333; border-radius: 10px; padding: 12px; color: white; width: 100%; outline: none; font-size: 14px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        .modal.active { display: flex; }
        .logo-container { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #e11d48; overflow: hidden; background: #1a1a1e; display: flex; align-items: center; justify-content: center; }
        .badge-apto { background: linear-gradient(45deg, #ffd700, #b8860b); color: black; font-weight: 900; padding: 2px 6px; border-radius: 4px; font-size: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .day-chip { padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 800; border: 1px solid #333; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .day-chip.selected { background: #e11d48; border-color: #fb7185; color: white; }
    </style>
</head>
<body class="p-4 pb-40">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="logo-container border-red-600 shadow-lg shadow-red-900/20">
                <img src="./logo.png" alt="Moura BJJ" class="w-full h-full object-contain">
            </div>
            <div>
                <h1 class="text-lg font-black uppercase italic leading-none">MOURA <span class="text-red-600">BJJ</span></h1>
                <p id="stats-topo" class="text-[9px] text-zinc-500 font-bold uppercase italic">CARREGANDO...</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="openM('m-mural')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 shadow-md">📢</button>
            <button onclick="openM('m-financeiro')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 shadow-md">💰</button>
            <button onclick="openM('m-gestao-geral')" class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 shadow-md">⚙️</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-[10px] font-black uppercase italic text-zinc-500 tracking-widest">Painel de Graduação</h2>
            <button onclick="resetFormAluno(); openM('m-aluno')" class="bg-red-600 px-5 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-red-900/40">+ Novo Atleta</button>
        </div>
        
        <div class="glass rounded-3xl p-4 overflow-x-auto border-t-2 border-red-600/30">
            <table class="w-full text-left min-w-[1100px]">
                <thead>
                    <tr class="text-zinc-600 text-[10px] font-black uppercase border-b border-zinc-800 pb-2 italic">
                        <th class="pb-2">ID / Atleta</th>
                        <th class="pb-2">Ficha (Peso/Idade)</th>
                        <th class="pb-2">Faixa / Unidade</th>
                        <th class="pb-2">Frequência / Aptidão</th>
                        <th class="pb-2">Financeiro</th>
                        <th class="pb-2 text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-alunos" class="divide-y divide-zinc-900"></tbody>
            </table>
        </div>
    </main>

    <div id="m-gestao-geral" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-2xl border border-red-600/20">
            <h2 class="text-xl font-black uppercase italic text-red-600 mb-6">Configurar Unidades</h2>
            <div class="bg-zinc-900/50 p-5 rounded-2xl mb-6 border border-zinc-800 space-y-4">
                <input type="text" id="esc-nome" class="input-pro" placeholder="Nome da Unidade (Ex: Moura Matriz)">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="time" id="esc-inicio" class="input-pro" title="Início das aulas">
                    <input type="time" id="esc-fim" class="input-pro" title="Término das aulas">
                </div>

                <div class="flex gap-1" id="dia-selector">
                    <div class="day-chip" data-day="SEG">S</div><div class="day-chip" data-day="TER">T</div>
                    <div class="day-chip" data-day="QUA">Q</div><div class="day-chip" data-day="QUI">Q</div>
                    <div class="day-chip" data-day="SEX">S</div><div class="day-chip" data-day="SAB">S</div>
                    <div class="day-chip" data-day="DOM">D</div>
                </div>

                <button onclick="addEscola()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg">Adicionar Unidade</button>
            </div>

            <h3 class="text-[10px] font-black uppercase italic text-zinc-500 mb-2 tracking-widest">Unidades Cadastradas</h3>
            <div id="lista-escolas" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
            
            <button onclick="closeM()" class="w-full mt-6 text-zinc-500 font-black uppercase text-[10px]">Fechar</button>
        </div>
    </div>

    <div id="m-aluno" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg border border-red-600/20">
            <h2 class="text-xl font-black uppercase italic text-red-600 mb-6">Cadastro Moura BJJ</h2>
            <form onsubmit="saveAluno(event)" class="space-y-4">
                <input type="hidden" id="a-id">
                <input type="text" id="a-nome" class="input-pro" placeholder="Nome Completo" required>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="tel" id="a-whats" class="input-pro" placeholder="WhatsApp (DDD+Número)">
                    <input type="number" id="a-peso" step="0.1" class="input-pro" placeholder="Peso (kg)">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="a-escola" class="input-pro" required></select>
                    <input type="date" id="a-nasc" class="input-pro" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="a-meta" class="input-pro" placeholder="Meta Aulas/Mês">
                    <input type="number" id="a-mensalidade" class="input-pro" placeholder="Mensalidade R$">
                </div>

                <select id="a-faixa" class="input-pro" required>
                    <option value="" disabled selected>Selecionar Faixa (17 Opções)</option>
                    <optgroup label="Infantil/Juvenil">
                        <option value="Branca">Branca</option><option value="Cinza/Branca">Cinza/Branca</option>
                        <option value="Cinza">Cinza</option><option value="Cinza/Preta">Cinza/Preta</option>
                        <option value="Amarela/Branca">Amarela/Branca</option><option value="Amarela">Amarela</option>
                        <option value="Amarela/Preta">Amarela/Preta</option><option value="Laranja/Branca">Laranja/Branca</option>
                        <option value="Laranja">Laranja</option><option value="Laranja/Preta">Laranja/Preta</option>
                        <option value="Verde/Branca">Verde/Branca</option><option value="Verde">Verde</option>
                        <option value="Verde/Preta">Verde/Preta</option>
                    </optgroup>
                    <optgroup label="Adulto">
                        <option value="Azul">Azul</option><option value="Roxa">Roxa</option><option value="Marrom">Marrom</option><option value="Preta">Preta</option>
                    </optgroup>
                </select>

                <button type="submit" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg">Confirmar Atleta</button>
                <button type="button" onclick="closeM()" class="w-full text-zinc-600 font-black text-[10px] uppercase mt-2">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="m-mural" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg">
            <h2 class="text-xl font-black uppercase italic text-red-600 mb-4">Mural de Avisos</h2>
            <textarea id="texto-mural" class="input-pro h-32 mb-4" placeholder="Escreva o comunicado oficial..."></textarea>
            <button onclick="enviarMuralGrupo()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase flex items-center justify-center gap-2 mb-4">ENVIAR NO WHATSAPP 🟢</button>
            <button onclick="closeM()" class="w-full text-zinc-500 font-black text-[10px] uppercase">Fechar</button>
        </div>
    </div>

    <div id="m-financeiro" class="modal">
        <div class="glass p-6 rounded-[2.5rem] w-full max-w-2xl border border-emerald-500/20">
            <h2 class="text-xl font-black uppercase italic text-emerald-500 mb-6">Gestão de Caixa</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20"><p class="text-[9px] font-black uppercase">Recebido</p><p id="fin-recebido" class="text-2xl font-black text-white">R$ 0,00</p></div>
                <div class="bg-red-500/10 p-4 rounded-2xl border border-red-500/20"><p class="text-[9px] font-black uppercase">A Receber</p><p id="fin-pendente" class="text-2xl font-black text-white">R$ 0,00</p></div>
            </div>
            <div id="lista-financeira-alunos" class="max-h-60 overflow-y-auto space-y-2 mb-6 pr-2"></div>
            <div class="flex gap-2">
                <button onclick="resetMesFinanceiro()" class="flex-1 bg-zinc-800 py-3 rounded-xl font-black text-[10px] uppercase">Novo Mês</button>
                <button onclick="closeM()" class="flex-1 bg-zinc-200 py-3 rounded-xl font-black text-[10px] uppercase text-black">Fechar</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4">
        <button onclick="openM('m-checkin')" class="w-full bg-red-600 py-6 rounded-full font-black text-xl italic shadow-2xl border-4 border-black active:scale-95 transition">OSS! CHECK-IN</button>
    </div>

    <div id="m-checkin" class="modal"><div class="glass p-10 rounded-[3rem] w-full max-w-xs text-center border-2 border-red-600/30"><h2 class="text-2xl font-black mb-6 italic uppercase">ID</h2><input type="number" id="c-id" class="input-pro text-center text-5xl h-24 mb-6 border-red-600/50" placeholder="0000"><button onclick="checkin()" class="w-full bg-red-600 py-5 rounded-2xl font-black uppercase shadow-lg">Confirmar</button></div></div>

    <script>
        let db = JSON.parse(localStorage.getItem('MOURA_BJJ_V_ULTRA')) || { atletas: [], escolas: [] };

        // Seleção de dias
        document.querySelectorAll('.day-chip').forEach(c => c.onclick = () => c.classList.toggle('selected'));

        function openM(id, autoEscola = null) {
            document.getElementById(id).classList.add('active');
            if(id === 'm-aluno') {
                const sel = document.getElementById('a-escola');
                sel.innerHTML = db.escolas.map(e => `<option value="${e.n}" ${autoEscola === e.n ? 'selected' : ''}>${e.n}</option>`).join('') || '<option value="Padrão">Matriz</option>';
            }
            if(id === 'm-gestao-geral') renderEscolas();
            if(id === 'm-financeiro') renderFinanceiro();
        }

        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function save() { localStorage.setItem('MOURA_BJJ_V_ULTRA', JSON.stringify(db)); render(); }

        // GESTÃO DE UNIDADES (CORRIGIDO)
        function addEscola() {
            const n = document.getElementById('esc-nome').value.toUpperCase();
            const hI = document.getElementById('esc-inicio').value;
            const hF = document.getElementById('esc-fim').value;
            const dias = Array.from(document.querySelectorAll('.day-chip.selected')).map(x => x.dataset.day);

            if(n && hI && hF && dias.length > 0) {
                db.escolas.push({ n, hI, hF, dias, id: Date.now() });
                save();
                renderEscolas();
                // Limpar campos
                document.getElementById('esc-nome').value = "";
                document.getElementById('esc-inicio').value = "";
                document.getElementById('esc-fim').value = "";
                document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('selected'));
            } else {
                alert("Preencha Nome, Horários e escolha os Dias!");
            }
        }

        function renderEscolas() {
            const lista = document.getElementById('lista-escolas');
            lista.innerHTML = db.escolas.map(e => `
                <div class="bg-zinc-800 p-3 rounded-xl flex justify-between items-center border border-zinc-700">
                    <div>
                        <p class="text-[10px] font-black text-red-500 italic uppercase">${e.n}</p>
                        <p class="text-[8px] text-zinc-500 font-bold uppercase">${e.hI} - ${e.hF} • ${e.dias.join(', ')}</p>
                    </div>
                    <button onclick="delEscola(${e.id})" class="text-red-900 font-black text-[9px]">REMOVER</button>
                </div>`).join('');
        }

        function delEscola(id) {
            if(confirm("Excluir esta unidade?")) {
                db.escolas = db.escolas.filter(e => e.id !== id);
                save(); renderEscolas();
            }
        }

        // GESTÃO DE ATLETAS
        function saveAluno(e) {
            e.preventDefault();
            const id = document.getElementById('a-id').value;
            const obj = {
                id: id ? parseInt(id) : Date.now(),
                nome: document.getElementById('a-nome').value.toUpperCase(),
                whats: document.getElementById('a-whats').value,
                peso: document.getElementById('a-peso').value,
                escola: document.getElementById('a-escola').value,
                nasc: document.getElementById('a-nasc').value,
                meta: parseInt(document.getElementById('a-meta').value) || 20,
                mensalidade: parseFloat(document.getElementById('a-mensalidade').value) || 0,
                faixa: document.getElementById('a-faixa').value,
                pago: id ? db.atletas.find(x => x.id == id).pago : false,
                frequencia: id ? db.atletas.find(x => x.id == id).frequencia : 0
            };
            if(id) db.atletas[db.atletas.findIndex(x => x.id == id)] = obj; else db.atletas.push(obj);
            save(); closeM();
        }

        function calcIdade(dn) {
            if(!dn) return "";
            const n = new Date(dn); const h = new Date();
            let i = h.getFullYear() - n.getFullYear();
            if (h.getMonth() < n.getMonth() || (h.getMonth() == n.getMonth() && h.getDate() < n.getDate())) i--;
            return i + " ANOS";
        }

        function render() {
            document.getElementById('stats-topo').innerText = db.atletas.length + " ATLETAS REGISTRADOS";
            document.getElementById('lista-alunos').innerHTML = db.atletas.map(a => {
                const isApto = a.frequencia >= a.meta;
                return `<tr class="text-[11px] border-b border-zinc-900">
                    <td class="py-5 font-black text-white italic">#${a.id.toString().slice(-4)}<br>${a.nome}</td>
                    <td class="font-bold text-zinc-400 font-mono">${a.peso ? a.peso+'kg' : '--'}<br><span class="text-[8px] uppercase font-black">${calcIdade(a.nasc)}</span></td>
                    <td class="uppercase italic font-bold text-zinc-300">${a.faixa}<br><span class="text-red-500 text-[9px] font-black">${a.escola}</span></td>
                    <td>
                        <div class="w-24 bg-zinc-800 h-1 rounded-full overflow-hidden mb-1"><div class="bg-red-600 h-full" style="width:${Math.min((a.frequencia/a.meta)*100, 100)}%"></div></div>
                        <div class="flex items-center gap-2">${isApto ? '<span class="badge-apto">APTO AO GRAU</span>' : '<span class="text-[9px] font-black">'+a.frequencia+'/'+a.meta+' AULAS</span>'}</div>
                    </td>
                    <td><span class="${a.pago ? 'text-emerald-500' : 'text-red-600'} font-black italic uppercase">${a.pago ? 'PAGO ✓' : 'ABERTO'}</span></td>
                    <td class="text-right">
                        <button onclick="cobrarIndividual(${a.id})" class="mr-3">💬</button>
                        <button onclick="editAluno(${a.id})" class="bg-zinc-800 px-3 py-1 rounded text-[8px] font-black">EDITAR</button>
                    </td>
                </tr>`;
            }).join('');
        }

        // FINANCEIRO E WHATSAPP
        function renderFinanceiro() {
            let recebido = 0, pendente = 0;
            const lista = document.getElementById('lista-financeira-alunos');
            lista.innerHTML = db.atletas.map(a => {
                if(a.pago) recebido += a.mensalidade; else pendente += a.mensalidade;
                return `<div class="bg-zinc-900 p-3 rounded-xl flex justify-between items-center border border-zinc-800">
                    <div><p class="text-[10px] font-black">${a.nome}</p><p class="text-[9px] font-bold ${a.pago ? 'text-emerald-500' : 'text-red-500'} italic">R$ ${a.mensalidade.toFixed(2)}</p></div>
                    <div class="flex gap-2">
                        <button onclick="cobrarIndividual(${a.id})" class="bg-zinc-800 p-2 rounded-lg">💬</button>
                        <button onclick="togglePagamento(${a.id})" class="text-[9px] font-black px-4 py-2 rounded-lg ${a.pago ? 'bg-emerald-500/20 text-emerald-500' : 'bg-red-500 text-white'} uppercase">${a.pago ? 'PAGO ✓' : 'BAIXA $'}</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('fin-recebido').innerText = "R$ " + recebido.toFixed(2);
            document.getElementById('fin-pendente').innerText = "R$ " + pendente.toFixed(2);
        }

        function togglePagamento(id) { const a = db.atletas.find(x => x.id == id); a.pago = !a.pago; save(); renderFinanceiro(); }

        function resetMesFinanceiro() { if(confirm("Virar o mês e resetar pagamentos/presenças?")) { db.atletas.forEach(a => { a.pago = false; a.frequencia = 0; }); save(); renderFinanceiro(); } }

        function cobrarIndividual(id) {
            const a = db.atletas.find(x => x.id == id);
            const msg = `Oss ${a.nome}! Moura BJJ passando para lembrar do vencimento da mensalidade (R$ ${a.mensalidade.toFixed(2)}).`;
            window.open(`https://wa.me/55${a.whats}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function enviarMuralGrupo() {
            const t = document.getElementById('texto-mural').value;
            if(!t) return;
            window.open(`https://wa.me/?text=${encodeURIComponent("*AVISO MOURA BJJ* 🥋\n\n" + t)}`, '_blank');
        }

        function checkin() {
            const id = document.getElementById('c-id').value;
            const a = db.atletas.find(x => x.id.toString().slice(-4) == id || x.id == id);
            if(a) { a.frequencia++; alert("CHECK-IN: " + a.nome + " OSS!"); save(); closeM(); } else alert("ID INVÁLIDO");
        }

        function editAluno(id) {
            const a = db.atletas.find(x => x.id == id);
            document.getElementById('a-id').value = a.id;
            document.getElementById('a-nome').value = a.nome;
            document.getElementById('a-whats').value = a.whats || "";
            document.getElementById('a-peso').value = a.peso || "";
            document.getElementById('a-nasc').value = a.nasc;
            document.getElementById('a-meta').value = a.meta;
            document.getElementById('a-mensalidade').value = a.mensalidade;
            document.getElementById('a-faixa').value = a.faixa;
            openM('m-aluno', a.escola);
        }

        function resetFormAluno() { 
            document.getElementById('a-id').value = ""; document.getElementById('a-nome').value = ""; 
            document.getElementById('a-whats').value = ""; document.getElementById('a-peso').value = "";
            document.getElementById('a-nasc').value = ""; document.getElementById('a-meta').value = "";
            document.getElementById('a-mensalidade').value = "";
        }

        render();
    </script>
</body>
</html>
